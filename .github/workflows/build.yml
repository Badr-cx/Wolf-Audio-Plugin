name: Build Wolf NGZ
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # هاد السطر هو اللي كيحيد التحذير وكيفعل Node.js 24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Packaging Wolf Plugin
        run: |
          # مسح أي بقايا قديمة
          rm -rf Wolf WOLF.SERVER.ngz
          
          # إنشاء المجلدات
          mkdir -p Wolf/logos
          
          # نسخ الملفات (تأكد أن هاد الملفات كاينة في الـ Root ديال GitHub)
          [ -f plugin.py ] && cp plugin.py Wolf/
          [ -f __init__.py ] && cp __init__.py Wolf/
          
          # نسخ الصور من مجلد logos
          if [ -d logos ]; then
            cp logos/*.png Wolf/logos/ 2>/dev/null || echo "No images found"
          fi
          
          # جمع كلشي في ملف NGZ
          tar -cvf WOLF.SERVER.ngz Wolf/

      - name: Upload NGZ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wolf-Plugin-Package
          path: WOLF.SERVER.ngz
