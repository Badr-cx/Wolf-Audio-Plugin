name: Build Wolf NGZ
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Plugin Files
        run: |
          mkdir -p Wolf/logos

          # 1. إنشاء ملف __init__.py
          printf "# -*- coding: utf-8 -*-\nfrom os.path import dirname\ndef getPluginPath(): return dirname(__file__)\n" > Wolf/__init__.py

          # 2. إنشاء ملف plugin.info
          printf "name=Wolf Auto Sync\ndescription=Auto Audio Sync & Logos by Wolf Maroc\nversion=1.0\nauthor=Wolf Maroc\n" > Wolf/plugin.info

          # 3. إنشاء ملف plugin.py (باستخدام الطريقة الآمنة)
          cat << 'EOF' > Wolf/plugin.py
# -*- coding: utf-8 -*-
import os, urllib2
from Screens.Screen import Screen
from Components.Pixmap import Pixmap
from Components.MenuList import MenuList
from Components.ActionMap import ActionMap
from Plugins.Plugin import PluginDescriptor

M3U_URL = "https://www.dropbox.com/scl/fi/2m2y1a89ecq3x5iszbe1z/AR__BEIN_SPORT_SD-HAMAVM.m3u?rlkey=nkjezbtac1epykpqr4fwz9rmu&dl=1"
PLUGIN_PATH = os.path.dirname(__file__)

class WolfFinalSync(Screen):
    skin = """<screen position="0,0" size="1280,720" flags="wfNoBorder" backgroundColor="transparent">
        <widget name="menu" position="50,150" size="450,450" scrollbarMode="showOnDemand" />
        <widget name="dynamic_logo" position="1000,40" size="250,110" alphatest="blend" zPosition="10" />
    </screen>"""

    def __init__(self, session):
        Screen.__init__(self, session)
        self.channels = []
        self["menu"] = MenuList([])
        self["dynamic_logo"] = Pixmap()
        self["actions"] = ActionMap(["SetupActions"], {"ok": self.start_sync, "cancel": self.exit}, -1)
        self.load_m3u()

    def load_m3u(self):
        try:
            req = urllib2.urlopen(M3U_URL)
            for line in req.readlines():
                if "#EXTINF" in line:
                    name = line.split(",")[-1].strip()
                    logo_file = name.lower().replace(" ", "").replace("sports", "") + ".png"
                    self.channels.append((name, logo_file))
            self["menu"].setList([x[0] for x in self.channels])
        except: pass

    def start_sync(self):
        idx = self["menu"].getSelectedIndex()
        if idx < 0: return
        name, logo_file = self.channels[idx]
        full_logo_path = os.path.join(PLUGIN_PATH, "logos", logo_file)
        if os.path.exists(full_logo_path):
            self["dynamic_logo"].instance.setPixmapFromFile(full_logo_path)
            self["dynamic_logo"].show()
        os.system("echo 1 > /proc/stb/video/sync")
        os.system("echo audio > /proc/stb/video/sync_source")
        self["menu"].hide()

    def exit(self):
        os.system("echo pcr > /proc/stb/video/sync_source")
        self.close()

def main(session, **kwargs): session.open(WolfFinalSync)
def Plugins(**kwargs):
    return [PluginDescriptor(name="Wolf Auto Sync", where=PluginDescriptor.WHERE_PLUGINMENU, fnc=main)]
EOF

          # 4. نسخ الصور وجمع الـ NGZ
          if [ -d logos ]; then
            cp logos/*.png Wolf/logos/ 2>/dev/null || true
          fi
          tar -cvf WOLF.SERVER.ngz Wolf/

      - name: Upload NGZ
        uses: actions/upload-artifact@v4
        with:
          name: Wolf-Maroc-Package
          path: WOLF.SERVER.ngz
