name: Build Wolf NGZ
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Plugin Files
        run: |
          mkdir -p Wolf/logos

          # 1. إنشاء ملف __init__.py (Base64)
          echo "IyAtKi0gY29kaW5nOiB1dGYtOCAtKi0KZnJvbSBvcy5wYXRoIGltcG9ydCBkaXJuYW1lCmRlZiBnZXRQbHVnaW5QYXRoKCk6CiAgICByZXR1cm4gZGlybmFtZShfX2ZpbGVfXyk=" | base64 -d > Wolf/__init__.py

          # 2. إنشاء ملف plugin.info (Base64)
          echo "bmFtZT1Xb2xmIEF1dG8gU3luYwpkZXNjcmlwdGlvbj1BdXRvIEF1ZGlvIFN5bmMgJiBMb2dvcyBieSBXb2xmIE1hcm9jCnZlcnNpb249MS4wCmF1dGhvcj1Xb2xmIE1hcm9j" | base64 -d > Wolf/plugin.info

          # 3. إنشاء ملف plugin.py (Base64 - هاد الطريقة كتحمي السطر 21 وكل الأسطر)
          echo "IyAtKi0gY29kaW5nOiB1dGYtOCAtKi0KaW1wb3J0IG9zLCB1cmxsaWIyCmZyb20gU2NyZWVucy5TY3JlZW4gaW1wb3J0IFNjcmVlbgpmcm9tIENvbXBvbmVudHMuUGl4bWFwIGltcG9ydCBQaXhtYXAKZnJvbSBDb21wb25lbnRzLk1lbnVMaXN0IGltcG9ydCBNZW51TGlzdApmcm9tIENvbXBvbmVudHMuQWN0aW9uTWFwIGltcG9yd " | base64 -d > Wolf/plugin.py

          # 4. نسخ الصور وجمع الـ NGZ
          if [ -d logos ]; then
            cp logos/*.png Wolf/logos/ 2>/dev/null || true
          fi
          tar -cvf WOLF.SERVER.ngz Wolf/

      - name: Upload NGZ
        uses: actions/upload-artifact@v4
        with:
          name: Wolf-Maroc-Package
          path: WOLF.SERVER.ngz
